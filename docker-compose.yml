services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/rails server -b 0.0.0.0 -p 3000
    volumes:
      - .:/rails
      - rails_storage:/rails/storage
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=development
      - OTEL_SERVICE_NAME=hotel-food-app
      # External OTLP collector endpoint
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://otel.play.base14.io/01jvsbqh714xh44zxjk9d5a70j/otlp
      # OIDC authentication credentials
      - OTEL_CLIENT_ID=liveheats-agent
      - OTEL_CLIENT_SECRET=Uuu7LhVdsfDZqKK6ChmxfODFKYsultIq
      - OTEL_TOKEN_URL=https://id.b14.dev/realms/liveheats/protocol/openid-connect/token

volumes:
  rails_storage:
  bundle_cache:
